<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Запитването е изпратено — Webnova</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:   #080808;
      --bg2:  #0f0f0f;
      --bg3:  #161616;
      --neon: #00ff88;
      --blue: #00d4ff;
      --text: #f0f0f0;
      --muted:#888;
      --border: rgba(255,255,255,0.08);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }

    /* Animated blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.12;
      animation: blobMove 8s ease-in-out infinite;
      pointer-events: none;
    }
    .blob1 { width: 400px; height: 400px; background: var(--neon); top: -100px; left: -100px; }
    .blob2 { width: 350px; height: 350px; background: var(--blue); bottom: -100px; right: -100px; animation-delay: -4s; }

    @keyframes blobMove {
      0%,100% { transform: translate(0,0) scale(1); }
      50%      { transform: translate(30px,20px) scale(1.08); }
    }

    .card {
      position: relative;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      text-align: center;
      max-width: 480px;
      width: 100%;
      z-index: 1;
    }

    /* Neon top border */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--neon), transparent);
    }

    /* Checkmark animation */
    .icon-wrap {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: rgba(0,255,136,0.08);
      border: 2px solid rgba(0,255,136,0.3);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.75rem;
      animation: pulse 2s ease-in-out infinite;
    }
    .icon-wrap svg { width: 40px; height: 40px; }
    .checkmark {
      stroke-dasharray: 60;
      stroke-dashoffset: 60;
      animation: drawCheck 0.6s ease 0.3s forwards;
    }
    @keyframes drawCheck {
      to { stroke-dashoffset: 0; }
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(0,255,136,0.15); }
      50%      { box-shadow: 0 0 0 12px rgba(0,255,136,0); }
    }

    h1 {
      font-size: 1.7rem;
      font-weight: 800;
      margin-bottom: .75rem;
      background: linear-gradient(135deg, var(--neon), var(--blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      font-size: .95rem;
      color: var(--muted);
      line-height: 1.75;
      margin-bottom: 2rem;
    }
    p strong { color: var(--text); }

    .details {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 2rem;
      text-align: left;
    }
    .details div {
      display: flex;
      align-items: center;
      gap: .75rem;
      font-size: .875rem;
      color: var(--muted);
      padding: .5rem 0;
      border-bottom: 1px solid var(--border);
    }
    .details div:last-child { border-bottom: none; }
    .details div strong { color: var(--text); }
    .details .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--neon);
      flex-shrink: 0;
      box-shadow: 0 0 6px var(--neon);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      background: var(--neon);
      color: #000;
      padding: .85rem 2rem;
      border-radius: 10px;
      font-size: .95rem;
      font-weight: 700;
      text-decoration: none;
      transition: transform .2s, box-shadow .2s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 24px rgba(0,255,136,0.4);
    }

    .logo {
      font-size: .85rem;
      color: var(--muted);
      margin-top: 2rem;
      letter-spacing: .05em;
    }
    .logo strong { color: var(--neon); }
  </style>
</head>
<body>

  <div class="blob blob1"></div>
  <div class="blob blob2"></div>

  <div class="card">
    <div class="icon-wrap">
      <svg viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polyline class="checkmark" points="10,27 20,37 40,15"
          stroke="#00ff88" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <h1>Запитването е изпратено!</h1>
    <p>Благодарим за интереса към Webnova.<br>Ще се свържем с вас в рамките на <strong>24 часа</strong>.</p>

    <div class="details">
      <div><span class="dot"></span> Обаждане от <strong>0895 615 903</strong></div>
      <div><span class="dot"></span> Viber на същия номер</div>
      <div><span class="dot"></span> <strong>ivokarabashev@gmail.com</strong></div>
    </div>

    <a href="/" class="btn">← Обратно към сайта</a>
    <div class="logo">Web<strong>nova</strong> · Пловдив</div>
  </div>

</body>
</html>
